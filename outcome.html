<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Outcome Recorder — ManagementOS</title>
  <meta name="description" content="ManagementOS タスクの実行結果（outcome）を記録するダッシュボード">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a0a0f;
      --bg-card: #12121a;
      --bg-card-hover: #1a1a28;
      --border: #1e1e30;
      --border-glow: #2a2a50;
      --text-primary: #e8e8f0;
      --text-secondary: #8888a0;
      --text-muted: #555570;
      --accent-green: #22c55e;
      --accent-green-bg: rgba(34, 197, 94, 0.08);
      --accent-amber: #f59e0b;
      --accent-amber-bg: rgba(245, 158, 11, 0.08);
      --accent-red: #ef4444;
      --accent-red-bg: rgba(239, 68, 68, 0.08);
      --accent-blue: #3b82f6;
      --accent-blue-bg: rgba(59, 130, 246, 0.08);
      --radius: 12px;
      --radius-sm: 8px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.5;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 24px 16px;
    }

    /* Header */
    header {
      text-align: center;
      margin-bottom: 32px;
      padding: 32px 0 24px;
    }

    header h1 {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #e8e8f0, #8888a0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .header-meta {
      display: flex;
      justify-content: center;
      gap: 16px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .header-meta .count {
      color: var(--accent-blue);
      font-weight: 600;
    }

    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 6px;
      animation: pulse 2s ease-in-out infinite;
    }

    .status-dot.live { background: var(--accent-green); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
    }

    .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state h2 { font-size: 18px; color: var(--text-secondary); margin-bottom: 8px; }

    /* Task Card */
    .task-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 12px;
      transition: all 0.2s ease;
    }

    .task-card:hover {
      background: var(--bg-card-hover);
      border-color: var(--border-glow);
    }

    .task-card.recorded {
      opacity: 0.5;
      pointer-events: none;
    }

    .task-card.recorded .card-actions { display: none; }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .card-project {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--accent-blue);
      background: var(--accent-blue-bg);
      padding: 3px 8px;
      border-radius: 4px;
    }

    .card-id {
      font-size: 11px;
      color: var(--text-muted);
      font-family: monospace;
    }

    .card-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
      line-height: 1.4;
    }

    .card-meta {
      display: flex;
      gap: 16px;
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    .card-meta span::before {
      margin-right: 4px;
    }

    /* Action Buttons */
    .card-actions {
      display: flex;
      gap: 8px;
    }

    .outcome-btn {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: transparent;
      color: var(--text-secondary);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .outcome-btn:hover {
      transform: translateY(-1px);
    }

    .outcome-btn.complete {
      border-color: var(--accent-green);
      color: var(--accent-green);
    }
    .outcome-btn.complete:hover {
      background: var(--accent-green-bg);
      box-shadow: 0 0 20px rgba(34, 197, 94, 0.15);
    }

    .outcome-btn.partial {
      border-color: var(--accent-amber);
      color: var(--accent-amber);
    }
    .outcome-btn.partial:hover {
      background: var(--accent-amber-bg);
      box-shadow: 0 0 20px rgba(245, 158, 11, 0.15);
    }

    .outcome-btn.failed {
      border-color: var(--accent-red);
      color: var(--accent-red);
    }
    .outcome-btn.failed:hover {
      background: var(--accent-red-bg);
      box-shadow: 0 0 20px rgba(239, 68, 68, 0.15);
    }

    /* Note Input (appears after button click) */
    .note-section {
      display: none;
      margin-top: 12px;
      animation: slideDown 0.2s ease;
    }

    .note-section.visible { display: block; }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .note-input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      resize: none;
      outline: none;
      transition: border-color 0.15s;
    }

    .note-input:focus {
      border-color: var(--accent-blue);
    }

    .note-input::placeholder {
      color: var(--text-muted);
    }

    .note-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 8px;
    }

    .note-submit {
      padding: 8px 16px;
      border: none;
      border-radius: var(--radius-sm);
      background: var(--accent-blue);
      color: white;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .note-submit:hover { opacity: 0.85; }

    .note-cancel {
      padding: 8px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: transparent;
      color: var(--text-muted);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      cursor: pointer;
    }

    /* Recorded badge */
    .recorded-badge {
      display: none;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 600;
      margin-top: 12px;
    }

    .task-card.recorded .recorded-badge { display: flex; }

    .recorded-badge.outcome-complete {
      background: var(--accent-green-bg);
      color: var(--accent-green);
    }
    .recorded-badge.outcome-partial {
      background: var(--accent-amber-bg);
      color: var(--accent-amber);
    }
    .recorded-badge.outcome-failed {
      background: var(--accent-red-bg);
      color: var(--accent-red);
    }

    /* Nav */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 13px;
      margin-bottom: 16px;
      transition: color 0.15s;
    }
    .back-link:hover { color: var(--text-secondary); }

    /* Loading */
    .loading {
      text-align: center;
      padding: 60px;
      color: var(--text-muted);
    }

    .spinner {
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 2px solid var(--border);
      border-top-color: var(--accent-blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--bg-card);
      border: 1px solid var(--accent-green);
      color: var(--accent-green);
      padding: 12px 24px;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 600;
      z-index: 1000;
      transition: transform 0.3s ease;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
  <div class="container">
    <a href="index.html" class="back-link">← タスクダッシュボード</a>

    <header>
      <h1>📋 Outcome Recorder</h1>
      <div class="header-meta">
        <span><span class="status-dot live"></span>LIVE</span>
        <span>待機中: <span class="count" id="task-count">-</span>件</span>
        <span>更新: <span id="updated-at">--:--</span></span>
      </div>
    </header>

    <div id="task-list">
      <div class="loading">
        <div class="spinner"></div>
        <div>タスクを読み込み中...</div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">✅ 記録しました</div>

  <script>
    const OUTCOME_JSON = 'outcome_tasks.json';
    // Google Spreadsheet の Outcome 記録用 (GAS Web App URL)
    // 設定後にここに URL を入れる
    const GAS_URL = '';

    let allTasks = [];
    const recorded = JSON.parse(localStorage.getItem('outcome_recorded') || '{}');

    async function loadTasks() {
      try {
        const res = await fetch(OUTCOME_JSON + '?t=' + Date.now());
        const data = await res.json();

        allTasks = data.tasks || [];
        document.getElementById('task-count').textContent = allTasks.length;
        document.getElementById('updated-at').textContent =
          data.updated_at ? data.updated_at.split(' ')[1] : '--:--';

        renderTasks();
      } catch (e) {
        document.getElementById('task-list').innerHTML =
          '<div class="empty-state"><div class="icon">⚠️</div><h2>読み込みエラー</h2><p>' + e.message + '</p></div>';
      }
    }

    function renderTasks() {
      const container = document.getElementById('task-list');

      if (allTasks.length === 0) {
        container.innerHTML =
          '<div class="empty-state"><div class="icon">🎉</div><h2>全タスク完了</h2><p>outcome_pending のタスクはありません</p></div>';
        return;
      }

      container.innerHTML = allTasks.map(task => {
        const isRecorded = recorded[task.task_id];
        const outcomeClass = isRecorded ? `outcome-${isRecorded.result}` : '';
        const outcomeLabel = isRecorded
          ? { complete: '✅ 完了', partial: '△ 一部完了', failed: '❌ 未達成' }[isRecorded.result] || '記録済み'
          : '';

        return `
          <div class="task-card ${isRecorded ? 'recorded' : ''}" data-id="${task.task_id}">
            <div class="card-top">
              <span class="card-project">${task.project || '—'}</span>
              <span class="card-id">${task.short_id || task.task_id}</span>
            </div>
            <div class="card-title">${task.title}</div>
            <div class="card-meta">
              ${task.deadline ? `<span>📅 ${task.deadline}</span>` : ''}
              ${task.source ? `<span>📥 ${task.source}</span>` : ''}
              ${task.meta?.category ? `<span>🏷 ${task.meta.category}</span>` : ''}
            </div>

            <div class="card-actions">
              <button class="outcome-btn complete" onclick="selectOutcome('${task.task_id}', 'complete')">
                ✅ 完了
              </button>
              <button class="outcome-btn partial" onclick="selectOutcome('${task.task_id}', 'partial')">
                △ 一部
              </button>
              <button class="outcome-btn failed" onclick="selectOutcome('${task.task_id}', 'failed')">
                ❌ 未達
              </button>
            </div>

            <div class="note-section" id="note-${task.task_id}">
              <textarea class="note-input" id="note-input-${task.task_id}"
                placeholder="メモ（任意）: なぜズレた？次どうする？" rows="2"></textarea>
              <div class="note-actions">
                <button class="note-cancel" onclick="cancelNote('${task.task_id}')">キャンセル</button>
                <button class="note-submit" id="submit-${task.task_id}">記録する</button>
              </div>
            </div>

            <div class="recorded-badge ${outcomeClass}">${outcomeLabel}</div>
          </div>
        `;
      }).join('');
    }

    let pendingOutcome = {};

    function selectOutcome(taskId, result) {
      pendingOutcome[taskId] = result;
      const noteEl = document.getElementById('note-' + taskId);
      noteEl.classList.add('visible');

      const submitBtn = document.getElementById('submit-' + taskId);
      submitBtn.onclick = () => submitOutcome(taskId);

      // フォーカス
      document.getElementById('note-input-' + taskId).focus();
    }

    function cancelNote(taskId) {
      delete pendingOutcome[taskId];
      document.getElementById('note-' + taskId).classList.remove('visible');
    }

    async function submitOutcome(taskId) {
      const result = pendingOutcome[taskId];
      const note = document.getElementById('note-input-' + taskId).value.trim();
      const task = allTasks.find(t => t.task_id === taskId);

      if (!result || !task) return;

      const payload = {
        task_id: taskId,
        short_id: task.short_id || '',
        title: task.title,
        project: task.project,
        result: result,  // complete / partial / failed
        note: note,
        recorded_at: new Date().toISOString(),
      };

      // ローカル記録（即座にUI反映）
      recorded[taskId] = payload;
      localStorage.setItem('outcome_recorded', JSON.stringify(recorded));
      renderTasks();
      showToast('✅ 記録しました: ' + (task.short_id || taskId));

      // GAS に送信（設定されている場合）
      if (GAS_URL) {
        try {
          await fetch(GAS_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });
        } catch (e) {
          console.warn('GAS送信失敗:', e);
        }
      }
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }

    // 初期ロード
    loadTasks();
  </script>
</body>
</html>
